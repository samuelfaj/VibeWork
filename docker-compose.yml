services:
  mysql:
    image: mysql:8.0
    container_name: vibe-mysql
    profiles: ['infra', 'full']
    ports:
      - '3307:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vibe_db}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - vibe-network

  backend:
    image: oven/bun:1
    container_name: vibe-backend
    profiles: ['full']
    working_dir: /app
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vibe_db}
      FRONTEND_URL: http://localhost:5173
      BETTER_AUTH_SECRET: local-dev-secret-change-me
      RUN_MIGRATIONS: 'true'
    volumes:
      - .:/app
      - backend_node_modules:/app/backend/node_modules
      - root_node_modules:/app/node_modules
      - shared_node_modules:/app/shared/contract/node_modules
    command: sh -c "cd /app && bun install && cd /app/backend && bun run start"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - vibe-network
    restart: unless-stopped

  frontend:
    image: oven/bun:1
    container_name: vibe-frontend
    profiles: ['full']
    working_dir: /app/frontend
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:3000
      NODE_ENV: development
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
      - root_node_modules:/app/node_modules
      - shared_node_modules:/app/shared/contract/node_modules
    command: sh -c "cd /app && bun install && cd /app/frontend && bun run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - vibe-network
    restart: unless-stopped

volumes:
  mysql_data:
  backend_node_modules:
  frontend_node_modules:
  shared_node_modules:
  root_node_modules:

networks:
  vibe-network:
    driver: bridge
